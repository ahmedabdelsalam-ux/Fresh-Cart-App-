<section class="py-12 bg-gray-50">
  <div class="container xl:w-[93%] mx-auto px-4">
    <!-- Header -->
    <div class="mb-8">
      <h2 class="text-2xl font-semibold text-gray-800">Top Brands</h2>
      <p class="text-sm text-gray-400 mt-1">Shop your favourite brands</p>
    </div>

    <!-- Grid -->
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
      @for (brand of allBrands(); track brand._id) {
        <div
          class="group bg-white rounded-2xl border border-gray-100 p-4 flex flex-col items-center gap-3 cursor-pointer hover:-translate-y-1 hover:border-green-200 hover:shadow-sm transition-all duration-300"
        >
          <!-- Logo wrapper -->
          <div
            class="w-full aspect-square rounded-xl bg-gray-50 flex items-center justify-center overflow-hidden p-3"
          >
            <img
              class="w-full h-full object-contain transition-transform duration-500 group-hover:scale-105"
              [src]="brand.image"
              [alt]="brand.name"
              [title]="brand.name"
            />
          </div>

          <!-- Name -->
          <p
            class="text-sm font-medium text-gray-600 group-hover:text-green-600 transition-colors duration-200 text-center truncate w-full"
          >
            {{ brand.name }}
          </p>
        </div>
      }
    </div>
  </div>
</section>
