<section class="py-16">
  <div class="container xl:w-[93%]">
    <!-- Header -->
    <div class="text-center mb-10">
      <p class="text-xs tracking-[0.18em] uppercase text-green-700 mb-2 font-light">
        our collection
      </p>
      <h2 class="font-serif text-3xl font-medium text-green-900 mb-3 capitalize">
        Shop <span class="text-green-500">All Products</span>
      </h2>
      <div class="w-10 h-0.5 bg-green-500 mx-auto rounded-full"></div>
    </div>

    <!-- Search -->
    <div class="relative max-w-md mx-auto my-6">
      <svg
        class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-green-600 pointer-events-none"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.35-4.35" />
      </svg>
      <input
        [(ngModel)]="text"
        type="search"
        id="search"
        class="w-full pl-11 pr-4 py-2.5 rounded-full border border-green-300 bg-green-50 text-green-900 text-sm placeholder:text-green-400 focus:outline-none focus:border-green-500 transition-colors duration-200"
        placeholder="Search By Title..."
      />
    </div>

    <!-- Grid -->
    <div class="mb-10 gap-4 grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5">
      @for (
        product of AllProductList() | paginate: pagination | searchByTitel: text;
        track product._id
      ) {
        <app-card [cardProduct]="product"></app-card>
      } @empty {
        <div class="col-span-5 w-1/4 mx-auto">
          <div
            class="p-4 mt-4 text-center text-base border-2 border-green-600 ring-green-600/50 text-green-600 rounded-lg bg-green-100 capitalize"
          >
            no data found
          </div>
        </div>
      }
    </div>

    <!-- Pagination -->
    <div class="text-center my-pagination">
      <pagination-controls id="products" (pageChange)="pageChanged($event)"> </pagination-controls>
    </div>
  </div>
</section>
