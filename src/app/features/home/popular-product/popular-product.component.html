<section class="py-16">
  <div class="container xl:w-[93%] px-4 sm:px-6 lg:px-0">
    <p class="text-xs tracking-widest text-gray-400 uppercase mb-1">Featured</p>
    <h2 class="text-2xl font-medium text-gray-900 mb-7">
      Popular <span class="text-green-600">Products</span>
    </h2>

    <div class="grid gap-4 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5">
      @for (product of productList().slice(0, 10); track product._id) {
        <app-card [cardProduct]="product"></app-card>
      }
    </div>
  </div>
</section>
