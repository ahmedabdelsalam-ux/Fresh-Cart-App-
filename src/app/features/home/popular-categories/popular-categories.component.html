<section class="pb-16 pt-10 bg-gray-100">
  <div class="container xl:w-[93%]">
    <p class="text-xs tracking-widest text-gray-400 uppercase mb-1">Browse</p>
    <h2 class="text-2xl font-medium text-gray-900 mb-6">
      Popular <span class="text-green-600">Categories</span>
    </h2>

    <owl-carousel-o [options]="categoriesCustomOptions">
      @for (category of categorieList(); track category._id) {
        <ng-template carouselSlide [id]="category._id">
          <div
            class="group cursor-pointer mx-2"
            [routerLink]="['/filter-product', category.slug, category._id]"
          >
            <div class="overflow-hidden rounded-2xl border border-gray-200 bg-white">
              <img
                class="w-full h-40 sm:h-48 object-cover transition-transform duration-300 group-hover:scale-105"
                [src]="category.image"
                [alt]="category.name"
                [title]="category.name"
              />
            </div>
            <p
              class="mt-2.5 text-sm font-medium text-gray-800 text-center group-hover:text-green-600 transition-colors duration-200"
            >
              {{ category.name }}
            </p>
          </div>
        </ng-template>
      }
    </owl-carousel-o>
  </div>
</section>
